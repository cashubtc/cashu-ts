name: Generate and Deploy Typedoc / Coverage Report
permissions:
  contents: write
  id-token: write
on:
  push:
    tags:
      - 'v4.*'
  # Manual runs: pick the latest release tag of the npm-latest major as the
  # ref — dispatching from main publishes unreleased next-major docs whenever
  # main is ahead of latest (e.g. during an rc phase)
  workflow_dispatch:

jobs:
  build:
    # Run on manual dispatch, or on non-prerelease v4 tags from mainline releases.
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Prepare Tests
        run: npm run test:prepare

      - name: Run Tests
        run: npm test

      - name: Generate Typedoc
        run: npm run typedoc

      - name: Deploy Typedoc to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          destination_dir: .
          publish_dir: ./docs
          cname: cashu-ts.dev
          # Overlay instead of wiping the branch: /coverage and /mutation
          # (weekly Stryker report) live alongside the typedoc root
          keep_files: true

      - name: Deploy Coverage to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          destination_dir: coverage/${{ github.head_ref || github.ref_name }}
          publish_dir: ./coverage
