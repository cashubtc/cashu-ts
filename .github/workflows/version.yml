name: Publish New Version Release

permissions:
  contents: write
  id-token: write

# *** NOTE: THIS WORKFLOW ONLY EVER RUNS FROM MAIN'S COPY ***
# Release events execute the default branch's workflow files, so the copies on
# vN-dev branches are inert: edit LATEST_MAJOR here on main, never anywhere else.
# (Manual workflow_dispatch runs must also be dispatched from main — dispatching
# from a vN-dev ref would use that branch's stale copy of this file.)
#
# Major version currently published under the npm `latest` dist-tag.
# Bump this (e.g. "4" -> "5") in a reviewed PR when a new major reaches GA — see the release
# strategy in DEVELOPER.md. Any major that is not LATEST_MAJOR publishes as `vN-lts`, never `latest`.
env:
  LATEST_MAJOR: '4'

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (optional, e.g. v3.2.1)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (release tag or manual tag)
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci
      - run: npm run compile

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          MAJOR_VERSION=$(echo $VERSION | cut -d. -f1)
          if echo "$VERSION" | grep -qE '[-](experimental|beta|alpha)'; then
            # experimental / unstable — off the release path; may change or be withdrawn
            echo "tag=experimental" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          elif echo "$VERSION" | grep -qE '[-]rc'; then
            # release candidate — the only pre-release we ship from main; becomes GA
            echo "tag=next" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          elif [ "$MAJOR_VERSION" = "$LATEST_MAJOR" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=v${MAJOR_VERSION}-lts" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Mark GitHub prerelease
        if: ${{ steps.npm-tag.outputs.prerelease == 'true' && (inputs.tag || github.event.release.tag_name) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_RELEASE_ID: ${{ github.event.release.id }}
        run: |
          set -euo pipefail

          TAG="${{ inputs.tag || github.event.release.tag_name }}"
          RELEASE_ID="$EVENT_RELEASE_ID"

          if [ -z "$RELEASE_ID" ]; then
            RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" --jq '.id')
          fi

          gh api \
            --method PATCH \
            "repos/${{ github.repository }}/releases/$RELEASE_ID" \
            -F prerelease=true \
            -f make_latest=false

      - name: Publish to npm (skip if already published)
        run: |
          set -euo pipefail

          PKG=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          TAG="${{ steps.npm-tag.outputs.tag }}"

          echo "Checking if ${PKG}@${VERSION} already exists on npm..."

          if npm view "${PKG}@${VERSION}" version >/dev/null 2>&1; then
            echo "Already published ${PKG}@${VERSION}, skipping npm publish"
          else
            npm publish --tag "${{ steps.npm-tag.outputs.tag }}"
          fi

      - run: npm run compile:standalone

      - name: Upload standalone bundle assets
        if: ${{ inputs.tag || github.event.release.tag_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.event.release.tag_name }}"
          gh release upload "$TAG" --clobber \
            "./lib/cashu-ts.iife.js" \
            "./lib/cashu-ts.iife.js.map" \
            "./lib/types/index.d.ts"

      - name: Update release notes to GitHub format
        if: ${{ inputs.tag || github.event.release.tag_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.event.release.tag_name }}"

          # Swap release-please CHANGELOG format back to GitHub default
          # so we keep contributor names etc in release notes
          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="$TAG" \
            --jq '.body')

          gh release edit "$TAG" --notes "$NOTES"
