name: Integration against mint (composite)
description: Reusable composite action that waits for a mint HTTP endpoint, runs tests
inputs:
  container_name:
    description: 'Container name used for logs and inspect'
    required: false
    default: 'mint'
  upload_coverage:
    description: 'Upload integration coverage to Codecov'
    required: false
    default: 'false'
  test_command:
    description: 'Command used to run the integration tests'
    required: false
    default: 'npm run test-integration'
  prepare_playwright:
    description: 'Install Playwright browsers before running tests'
    required: false
    default: 'false'
  prepare_playwright_command:
    description: 'Command used to install Playwright browsers before running tests'
    required: false
    default: 'npm run test:prepare'
  coverage_name:
    description: 'Codecov coverage upload name'
    required: false
    default: 'integration-cdk-stable'

runs:
  using: 'composite'
  steps:
    - name: Wait for mint to be ready (host-side)
      shell: bash
      run: |
        set -euo pipefail
        host_url="http://127.0.0.1:3338/v1/info"
        timeout=90
        interval=2
        elapsed=0
        container_name='${{ inputs.container_name }}'
        echo "Waiting up to ${timeout}s for mint at $host_url..."
        until curl --silent --show-error --fail --max-time 5 "$host_url" > /dev/null; do
          if [ "$elapsed" -ge "$timeout" ]; then
            echo "Timed out waiting for mint at $host_url"
            echo "--- Container inspect ---"
            docker inspect "$container_name" || true
            echo "--- Container logs (last 200 lines) ---"
            docker logs --tail 200 "$container_name" || true
            exit 1
          fi
          sleep "$interval"
          elapsed=$((elapsed + interval))
          echo "Still waiting... (${elapsed}/${timeout}s)"
        done
        echo "Mint responded to host HTTP at $host_url"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Build
      shell: bash
      run: npm run compile

    - name: Prepare Playwright
      if: ${{ inputs.prepare_playwright == 'true' }}
      shell: bash
      run: ${{ inputs.prepare_playwright_command }}

    - name: Run integration tests
      shell: bash
      run: ${{ inputs.test_command }}

    - name: Upload integration coverage to Codecov
      if: ${{ inputs.upload_coverage == 'true' }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ env.CODECOV_TOKEN }}
        flags: integration
        name: ${{ inputs.coverage_name }}

    - name: Dump mint logs on failure
      if: ${{ failure() }}
      shell: bash
      run: |
        container_name='${{ inputs.container_name }}'
        echo "=== ${container_name} inspect ==="
        docker inspect "$container_name" || true
        echo "=== ${container_name} logs (last 200 lines) ==="
        docker logs --tail 200 "$container_name" || true
